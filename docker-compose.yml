version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tutor123_app
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/html/public:cached   # :cached improves Mac performance
      - ./resources:/var/www/html/resources:cached
      - ./docker/apache/000-default.conf:/etc/apache2/sites-available/000-default.conf:cached
    depends_on:
      - db
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: lms
      DB_USERNAME: root
      DB_PASSWORD: root

  db:
    image: mysql:8.0
    container_name: tutor123_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lms
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
